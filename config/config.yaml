# =============================================================================
# Hermes Agent — Base Configuration (Cloud)
# =============================================================================
# This config is loaded on every deploy. Secrets (API keys) are NOT here.
# They live in .env on the persistent disk, set via the Hermes dashboard.
# =============================================================================

model:
  default: openrouter/owl-alpha
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions

providers: {}
fallback_providers: []
credential_pool_strategies: {}

toolsets:
  - hermes-cli

agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  clarify_timeout: 600
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto
  disabled_toolsets: []
  verbose: false
  reasoning_effort: medium

terminal:
  backend: docker          # Cloud = use Docker backend for tool execution
  cwd: .
  timeout: 180
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  persistent_shell: true
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200

web:
  backend: ddgs
  search_backend: ddgs
  extract_backend: ddgs

browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false
  allow_private_urls: false
  engine: auto

checkpoints:
  enabled: false
  max_snapshots: 20

file_read_max_chars: 100000

tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

compression:
  enabled: true
  threshold: 0.72
  target_ratio: 0.2
  protect_last_n: 20
  hygiene_hard_message_limit: 400
  protect_first_n: 3

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

delegation:
  max_iterations: 50
  child_timeout_seconds: 600
  max_concurrent_children: 3
  max_spawn_depth: 1
  subagent_auto_approve: false

skills:
  external_dirs: []
  template_vars: true
  inline_shell: false

curator:
  enabled: true
  interval_hours: 168

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny

security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true

display:
  compact: false
  personality: helpful
  streaming: true
  show_reasoning: false
  show_cost: false

tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural

stt:
  enabled: false             # Disable STT in cloud (no mic)

x_search:
  model: grok-4.20-reasoning
  timeout_seconds: 180
  retries: 2

cron:
  wrap_response: true

logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3

sessions:
  retention_days: 90

_config_version: 23
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

telegram:
  reactions: false
  channel_prompts: {}
  allowed_chats: ''
  enabled: true
  allow_from: ''             # Set your Telegram user ID here or via dashboard
