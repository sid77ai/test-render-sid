# =============================================================================
# Hermes Agent — Docker Compose (Local Dev / VPS)
# =============================================================================
# Use this for:
#   - Local testing before deploying to Render
#   - Deploying to a VPS (Hetzner, etc.) later
#
# Usage:
#   docker compose up -d          # Start Hermes
#   docker compose logs -f        # Watch logs
#   docker compose down           # Stop
#   docker compose exec hermes sh # Shell into container
# =============================================================================

version: "3.8"

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    # Or use the pre-built image directly:
    # image: docker.io/nousresearch/hermes-agent:v2026.5.7

    container_name: hermes
    restart: unless-stopped

    ports:
      - "8642:8642"     # Gateway + Dashboard

    volumes:
      # Persistent state — survives restarts and upgrades
      - ./data:/opt/data

    environment:
      # LLM Provider (REQUIRED — set these!)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-your-key-here}

      # Dashboard
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "8642"
      HERMES_DASHBOARD_TUI: "1"
      HERMES_GATEWAY_TOKEN: ${HERMES_GATEWAY_TOKEN:-}

      # Telegram (optional)
      # TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # TELEGRAM_ALLOW_FROM: ${TELEGRAM_ALLOW_FROM:-}

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8642/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
