# =============================================================================
# Hermes Agent on Render — Blueprint Config
# =============================================================================
# Deploy Hermes Agent on Render using a pre-built Docker image.
#
# HOW TO DEPLOY:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com/blueprints
#   3. Click "New Blueprint Instance"
#   4. Connect your GitHub repo
#   5. Render reads this file and creates the service automatically
#   6. Set your API keys in Render Dashboard → Environment tab
#
# NOTE: Free tier sleeps after 15 min inactivity.
#       Upgrade to Standard ($7/mo) for always-on + Telegram.
# =============================================================================

services:
  - type: web
    name: hermes
    runtime: image
    region: oregon
    plan: standard          # Use 'standard' for always-on (required for Telegram)
                            # Change to 'free' for POC without Telegram (sleeps after 15min)
    image:
      url: docker.io/nousresearch/hermes-agent:v2026.5.7

    dockerCommand: >-
      /bin/sh -c
      "touch /opt/hermes/ui-tui/packages/hermes-ink/dist/ink-bundle.js
       /opt/hermes/ui-tui/dist/entry.js
       && chown -R hermes:hermes /opt/hermes/ui-tui /opt/hermes/node_modules
       && exec /usr/bin/tini -g -- /opt/hermes/docker/entrypoint.sh gateway run"

    autoDeployTrigger: off
    healthCheckPath: /api/status

    disk:
      name: hermes-data
      mountPath: /opt/data
      sizeGB: 5

    envVars:
      # Dashboard (web UI)
      - key: HERMES_DASHBOARD
        value: "1"
      - key: HERMES_DASHBOARD_HOST
        value: "0.0.0.0"
      - key: HERMES_DASHBOARD_PORT
        value: "10000"
      - key: HERMES_DASHBOARD_TUI
        value: "1"

      # Gateway token (auto-generated)
      - key: HERMES_GATEWAY_TOKEN
        generateValue: true

      # LLM Provider — SET THIS IN RENDER DASHBOARD
      - key: OPENROUTER_API_KEY
        value: ""

      # Telegram — SET THESE IN RENDER DASHBOARD
      # Get bot token from @BotFather on Telegram
      # Get your user ID from @userinfobot
      - key: TELEGRAM_BOT_TOKEN
        value: ""
      - key: TELEGRAM_HOME_CHANNEL
        value: ""
