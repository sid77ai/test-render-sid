# =============================================================================
# Hermes Agent on Render — Blueprint Config
# =============================================================================
#
# TWO DEPLOYMENT OPTIONS:
#
# OPTION A — Simple (recommended for POC):
#   Uses the pre-built Docker Hub image. No Dockerfile needed.
#   Faster deploys, no build minutes used.
#   Custom skills are loaded from the persistent disk after first boot.
#   → Use the 'runtime: image' section below.
#
# OPTION B — Custom (your own Dockerfile with custom skills baked in):
#   Builds from the Dockerfile in this repo.
#   Slower deploys, uses build minutes.
#   Custom skills are baked into the image.
#   → Use the 'runtime: docker' section below.
#
# Uncomment ONE option, comment out the other.
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# OPTION A: Simple — Pre-built image (RECOMMENDED FOR POC)
# ─────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: hermes
    runtime: image
    region: oregon
    plan: free
    image:
      url: docker.io/nousresearch/hermes-agent:v2026.5.7

    dockerCommand: >-
      /bin/sh -c
      "touch /opt/hermes/ui-tui/packages/hermes-ink/dist/ink-bundle.js
       /opt/hermes/ui-tui/dist/entry.js
       && chown -R hermes:hermes /opt/hermes/ui-tui /opt/hermes/node_modules
       && exec /usr/bin/tini -g -- /opt/hermes/docker/entrypoint.sh gateway run"

    autoDeployTrigger: off
    healthCheckPath: /api/status

    disk:
      name: hermes-data
      mountPath: /opt/data
      sizeGB: 5

    envVars:
      - key: HERMES_DASHBOARD
        value: "1"
      - key: HERMES_DASHBOARD_HOST
        value: "0.0.0.0"
      - key: HERMES_DASHBOARD_PORT
        value: "10000"
      - key: HERMES_DASHBOARD_TUI
        value: "1"
      - key: HERMES_GATEWAY_TOKEN
        generateValue: true
      - key: OPENROUTER_API_KEY
        value: "PASTE_YOUR_OPENROUTER_KEY"

